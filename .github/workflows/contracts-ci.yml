name: Contracts CI

on:
  push:
    branches:
      - main
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"

jobs:
  contract-checks:
    name: Build, Lint & Test Soroban Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Cargo dependencies
        working-directory: contracts
        run: cargo audit 2>&1 | tee /tmp/cargo-audit.txt; exit ${PIPESTATUS[0]}

      - name: Upload cargo audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: /tmp/cargo-audit.txt

      - name: Run clippy (deny all warnings)
        working-directory: contracts
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run contract tests
        working-directory: contracts
        run: cargo test

      - name: Build WASM release binary
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Optimize WASM with wasm-opt
        working-directory: contracts
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release -name "*.wasm" | head -1)
          if [ -n "$WASM_FILE" ]; then
            echo "Optimizing $WASM_FILE with wasm-opt..."
            cp "$WASM_FILE" "${WASM_FILE}.unoptimized"
            npx -y wasm-opt@latest "$WASM_FILE" -Oz -o "$WASM_FILE" 2>/dev/null || \
              echo "wasm-opt not available, skipping optimization."
          else
            echo "No WASM file found."
          fi

      - name: Report WASM binary size before and after
        working-directory: contracts
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release -name "*.wasm" | head -1)
          if [ -n "$WASM_FILE" ]; then
            SIZE_KB=$(echo "scale=2; $(wc -c < "$WASM_FILE") / 1024" | bc)
            echo "### WASM Binary Size" >> $GITHUB_STEP_SUMMARY
            echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| \`$(basename $WASM_FILE)\` | ${SIZE_KB} KB (wasm-opt -Oz) |" >> $GITHUB_STEP_SUMMARY
            if [ -f "${WASM_FILE}.unoptimized" ]; then
              RAW_KB=$(echo "scale=2; $(wc -c < "${WASM_FILE}.unoptimized") / 1024" | bc)
              SAVING=$(echo "scale=1; (1 - $(wc -c < "$WASM_FILE") / $(wc -c < "${WASM_FILE}.unoptimized")) * 100" | bc)
              echo "| Raw build | ${RAW_KB} KB |" >> $GITHUB_STEP_SUMMARY
              echo "| Reduction | ${SAVING}% |" >> $GITHUB_STEP_SUMMARY
              rm -f "${WASM_FILE}.unoptimized"
            fi
          else
            echo "No WASM file found." >> $GITHUB_STEP_SUMMARY
          fi
